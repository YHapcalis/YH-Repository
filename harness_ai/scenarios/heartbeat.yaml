# 心跳LED功能验证
#
# 监控 PF9 (LED0) 的心跳闪烁模式。
# 验证 led_state 在亮/灭之间切换，heartbeat_phase 状态机正常循环。
#
# 心跳序列:
#   Phase 0: ON 100ms     ██  第1拍
#   Phase 1: OFF 100ms    ░░
#   Phase 2: ON 100ms     ██  第2拍
#   Phase 3: OFF 800ms    ░░░░░░░░  间歇
#   总周期: 1100ms ≈ 0.9Hz

name: "心跳LED验证"
description: "验证 PF9 (LED0) 心跳闪烁——led_state 周期性亮灭，相位循环"

targets:
  # 1. led_state 必须在观察期内变化（亮/灭切换）
  - variable: "led_state"
    check: change_detected
    params: {}

  # 2. led_state 亮起的比例应在合理范围（4 个相位中 2 个亮，但 phase2 仅 100ms）
  #    理论上亮占 ~18%（200ms/1100ms），但采样间隔下应能捕获到亮态
  - variable: "led_state"
    check: range
    params:
      min: 0
      max: 1

  # 3. heartbeat_phase 必须在 0~3 之间循环
  - variable: "heartbeat_phase"
    check: change_detected
    params: {}

source_files:
  - "Core/Src/heartbeat.c"
  - "Core/Inc/heartbeat.h"

notes: |
  前置条件：
    1. Heartbeat_Init() 已在 main.c 中调用
    2. Heartbeat_Tick() 在主循环中周期性调用
    3. led_state 和 heartbeat_phase 是 volatile 全局变量
