# 传感器数据采集验证场景
#
# 监控 I2C 传感器的通信状态和数据值，
# 验证传感器驱动正常工作。
#
# 适用:
#   - AHT20 温湿度传感器
#   - MPU6050 六轴传感器
#   - 任何 I2C/SPI 传感器

name: "传感器数据采集验证"
description: "验证 I2C 传感器读数正常——ready 标志置位，数据在合理范围"

targets:
  # 1. 传感器就绪标志
  - variable: "sensor_ready"
    check: range
    params:
      min: 1
      max: 1

  # 2. 温度在合理范围（室温 10~40°C）
  - variable: "temperature"
    check: range
    params:
      min: 10.0
      max: 40.0

  # 3. 湿度在合理范围（20~90%）
  - variable: "humidity"
    check: range
    params:
      min: 20.0
      max: 90.0

  # 4. 传感器数据会变化（不是死值）
  - variable: "temperature"
    check: change_detected
    params: {}

source_files:
  - "Core/Src/i2c.c"
  - "Core/Src/sensor.c"
  - "Core/Src/main.c"

notes: |
  前置条件：
    1. I2C 外设已初始化
    2. 传感器已上电且连接正常
    3. temperature/humidity/sensor_ready 为全局变量
