# MY_OTA_GUI OpenOCD 调试配置
# 20针 ST-LINK V2 (PID:0483:3748) + STM32F407ZGT6
# 生成日期: 2026-06-18

# TCL 端口：供 stm32_monitor.py 等外部工具实时读内存
tcl_port 6666

source [find interface/stlink-dap.cfg]
transport select dapdirect_swd

# 连接时复位：防止芯片运行中的代码阻塞 SWD 调试端口
set CONNECT_UNDER_RESET 1
reset_config srst_only srst_nogate connect_assert_srst

# 低功耗调试使能
set ENABLE_LOW_POWER 1

# 暂停时停止看门狗
set STOP_WATCHDOG 1

# SWD 时钟频率 (ST-LINK V2 上限 4MHz)
set CLOCK_FREQ 4000

source [find target/stm32f4x.cfg]

# GDB 断开时先 halt 目标，防止退出按钮卡死
$_TARGETNAME configure -event gdb-detach {
    echo "[openocd.cfg] GDB detached, halting target for clean shutdown..."
    halt
}
